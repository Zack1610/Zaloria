<!-- PÁGINA DE LISTA DE EQUIPOS - Muestra todos los equipos registrados -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaloria - Equipos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

    <header>
        <div th:replace="~{layout :: boton-tema(true)}"></div>
    </header>

    <main class="container">

        <!-- Encabezado con título y botones de navegación -->
        <section class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="display-6 cyan-text">Equipos eSports</h1>

            <!-- Navegación: botones para ir al panel, ver jugadores o crear nuevo equipo -->
            <nav>
                <a href="/admin" class="btn btn-secondary">Volver al Panel</a>
                <a href="/jugadores" class="btn btn-outline-info me-2">Ver Jugadores</a>
                <a href="/equipos/nuevo" class="btn btn-cyan">+ Nuevo Equipo</a>
            </nav>
        </section>

        <!-- Mensaje de error: se muestra solo si existe un errorTorneo -->
        <div th:if="${errorTorneo}" class="alert alert-danger alert-dismissible fade show mb-4 border-0 shadow" role="alert" style="background-color: #f82a4b; color: white;">
            <span th:text="${errorTorneo}"></span>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Tabla de equipos: muestra todos los equipos con sus datos principales -->
        <section>
            <div class="table-responsive">
            <table class="table table-dark table-hover align-middle">
                <thead>
                    <tr style="border-bottom: 2px solid #00bcd4;">
                        <th>Logo</th>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Capitán</th>
                        <th>Coach</th>
                        <th>Manager</th>
                        <th>Cupo Máx.</th> 
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody>
    <tr th:each="equipo : ${listaEquipos}">
        <td>
            <img th:src="@{'/images/logos/' + ${equipo.logoUrl != null ? equipo.logoUrl : 'default_logo.png'}}"
                 alt="Logo"
                 class="rounded-circle border border-secondary"
                 style="width: 45px; height: 45px; object-fit: contain; background-color: #1a1a1a;">
        </td>

        <td th:text="${equipo.id}" class="text-white"></td>
        <td th:text="${equipo.nombre}" class="fw-bold"></td>
        <td th:text="${equipo.capitan}"></td>
        <td th:text="${equipo.entrenador}"></td>
        <td class="text-info" th:text="${equipo.managers != null ? equipo.managers : 'Sin asignar'}"></td>
        <td th:text="${equipo.maxJugadores}"></td> 

        <td>
            <div class="btn-group">
                <a th:href="@{/equipos/editar/{id}(id=${equipo.id})}" 
                   class="btn btn-sm btn-outline-info">
                   editar
                </a>
                
                <a th:href="@{/equipos/eliminar/{id}(id=${equipo.id})}" 
                   class="btn btn-sm btn-outline-danger"
                   onclick="return confirm('¿Estás seguro de eliminar este equipo? Esta acción no se puede deshacer.')">
                   eliminar
                </a>
            </div>
        </td>
    </tr>
</tbody>
            </table>
            </div>
        </section>

    </main>

</body>
</html>
