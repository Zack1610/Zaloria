<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Zaloria - Equipos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; padding: 30px; }
        .table-dark { background-color: #1e1e1e; border: 1px solid #333; }
        .cyan-text { color: #00bcd4; font-weight: bold; }
        .btn-cyan { background-color: #00bcd4; color: black; font-weight: bold; }
        label { 
            color: #00bcd4 !important; 
            margin-bottom: 5px;
            display: block;
        }
        
        .form-control, .form-select {
            color: white !important;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="display-6 cyan-text"> Equipos eSports</h1>
        <div>
            <a href="/jugadores" class="btn btn-outline-info me-2">Ver Jugadores</a>
            <a href="/equipos/nuevo" class="btn btn-cyan">+ Nuevo Equipo</a>
        </div>
    </div>
    <table class="table table-dark table-hover">
        <thead>
            <tr style="border-bottom: 2px solid #00bcd4;">
                <th>ID</th>
                <th>Nombre</th>
                <th>Capitán</th>
                <th>Coach</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="equipo : ${listaEquipos}">
                <td th:text="${equipo.id}" class="text-white"></td>
                <td th:text="${equipo.nombre}" class="fw-bold"></td>
                <td th:text="${equipo.capitan}"></td>
                <td th:text="${equipo.entrenadores}"></td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
