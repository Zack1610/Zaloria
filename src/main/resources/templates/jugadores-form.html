<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Zaloria - Fichar Jugador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; padding-top: 50px; }
        .card-gamer { background-color: #1e1e1e; border: 1px solid #00bcd4; box-shadow: 0 0 15px rgba(0, 188, 212, 0.2); }
        .form-control, .form-select { background-color: #2a2a2a; border: 1px solid #444; color: white !important; }
        .form-control:focus, .form-select:focus { background-color: #333; border-color: #00bcd4; color: white; box-shadow: 0 0 8px rgba(0, 188, 212, 0.5); }
        .btn-cyan { background-color: #00bcd4; color: black; font-weight: bold; }
        .btn-cyan:hover { background-color: #0097a7; color: white; } 
        label { color: #00bcd4 !important; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card card-gamer p-4">
                <h2 class="text-center mb-4" style="color: #00bcd4;"> Registrar Jugador</h2>
                
                <form th:action="@{/jugadores/guardar}" th:object="${jugador}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="mb-3">
                        <label class="form-label">Nickname:</label>
                        <input type="text" th:field="*{nickname}" class="form-control" placeholder="Ej: ZackPro" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Email:</label>
                        <input type="email" th:field="*{email}" class="form-control" placeholder="zack@zaloria.com">
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">Equipo:</label>
                        <select th:field="*{equipo}" class="form-select" required>
                            <option value="" disabled selected>Selecciona equipo...</option>
                            <option th:each="e : ${listaEquipos}" th:value="${e.id}" th:text="${e.nombre}"></option>
                        </select>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-cyan">GUARDAR FICHAJE</button>
                        <a href="/jugadores" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
