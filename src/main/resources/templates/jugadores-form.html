<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Zaloria - Fichar Jugador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div th:replace="~{layout :: boton-tema}"></div>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card card-gamer p-4 shadow-lg">
                <h2 class="text-center mb-4" style="color: #00bcd4;"> Registrar Jugador</h2>
                
                <form th:action="@{/jugadores/guardar}" th:object="${jugador}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="mb-3">
                        <label class="form-label">Nickname:</label>
                        <input type="text" th:field="*{nickname}" class="form-control" placeholder="Ej: ZackPro" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Email:</label>
                        <input type="email" th:field="*{email}" class="form-control" placeholder="zack@zaloria.com">
                    </div>

                 <div class="mb-3">
                        <label class="form-label">Selecciona Skin:</label>
                    <select th:field="*{skinUrl}" class="form-select bg-dark text-white border-secondary">
                    <option value="" selected>-- Sin Skin --</option>
                    <option th:each="s : ${listaSkins}" th:value="${s}" th:text="${s}"></option>
                </select>
                    <small class="text-info">Lista generada desde /images/skins/</small>
                                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">Equipo:</label>
                        <select th:field="*{equipo}" class="form-select" required>
                            <option value="" disabled selected>Selecciona equipo...</option>
                            <option th:each="e : ${listaEquipos}" th:value="${e.id}" th:text="${e.nombre}"></option>
                        </select>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-cyan">GUARDAR FICHAJE</button>
                        <a href="/jugadores" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
