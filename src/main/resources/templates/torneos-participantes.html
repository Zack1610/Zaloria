<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Zaloria - Participantes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; padding: 50px; }
        .cyan-text { color: #00bcd4; }
        .equipo-card { 
            background-color: #1e1e1e; 
            border-left: 5px solid #00bcd4; 
            margin-bottom: 15px; 
            transition: 0.3s;
            border-radius: 8px;
        }
        .equipo-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,188,212,0.3); }
        .btn-cyan { background-color: #00bcd4; color: black; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-secondary">
        <div>
            <h2 class="cyan-text mb-1">️ Equipos Inscritos</h2>
            <h5 class="text-white" th:text="${torneo.nombre}">Nombre del Torneo</h5>
        </div>
        <a href="/torneos" class="btn btn-outline-info">️ Volver a Torneos</a>
    </div>

    <div class="row mt-4">
        <div class="col-md-6" th:each="e : ${torneo.equipos}">
            <div class="card equipo-card p-3 shadow-sm">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h5 class="mb-0 fw-bold text-white" th:text="${e.nombre}">Nombre del Equipo</h5>
                        <small class="text-info">Inscripción confirmada</small>
                    </div>
                    
                    <form th:action="@{/torneos/desvincular}" method="post">
                        <input type="hidden" name="torneoId" th:value="${torneo.id}">
                        <input type="hidden" name="equipoId" th:value="${e.id}">
                        <button type="submit" class="btn btn-sm btn-outline-danger" 
                                onclick="return confirm('¿Seguro que quieres retirar a este equipo?')">
                            ️ Retirar
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-12 text-center py-5" th:if="${#lists.isEmpty(torneo.equipos)}">
            <h3 class="text-white">No hay valientes apuntados todavía...</h3>
            <p>¡Ve a la lista y empieza a inscribir equipos!</p>
        </div>
    </div>
</div>
</body>
</html>
