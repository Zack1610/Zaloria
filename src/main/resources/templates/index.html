<!-- PÁGINA DE INICIO - Panel de Control Principal de Zaloria eSports -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <!-- Configuración básica del documento -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaloria eSports - Inicio</title>
    <!-- Estilos de Bootstrap para diseño responsivo -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Estilos personalizados del proyecto Zaloria -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

    <!-- Encabezado con botón de tema (claro/oscuro) y logout -->
    <header>
        <div th:replace="~{layout :: boton-tema(true)}"></div>
    </header>

    <!-- Contenido principal: Panel de Control -->
    <main class="container text-center">

        <!-- Sección de bienvenida con logo y título -->
        <section>
            <img th:src="@{/images/Zaloria-portada.png}" alt="Zaloria Logo" class="logo-principal img-fluid">
            <h2 class="mb-5" style="color: #00bcd4; letter-spacing: 3px;">PANEL DE CONTROL</h2>
        </section>

        <!-- Navegación: Botones de acceso rápido a las principales funcionalidades -->
        <nav>
            <div class="row justify-content-center gap-3">

                <!-- Botón para gestionar equipos -->
                <div class="col-md-4 d-grid">
                    <a href="/equipos" class="btn btn-gamer">️Gestionar Equipos</a>
                </div>

                <!-- Botón para gestionar jugadores -->
                <div class="col-md-4 d-grid">
                    <a href="/jugadores" class="btn btn-gamer">Gestionar Jugadores</a>
                </div>

                <!-- Botón para gestionar torneos -->
                <div class="col-md-4 d-grid">
                    <a href="/torneos" class="btn btn-gamer">Gestionar Torneos</a>
                </div>

                <!-- Botón para ver solicitudes de participación -->
                <div class="col-md-4 d-grid">
                    <a href="/admin/solicitudes" class="btn btn-gamer">Gestionar Solicitudes</a>
                </div>

                <!-- Botón para simular resultados de torneos -->
                <div class="col-md-4 d-grid">
                    <a href="/admin/resultados/nuevo" class="btn btn-gamer">Simular Resultados</a>
                </div>

                <!-- Botón para ver historial de resultados -->
                <div class="col-md-4 d-grid">
                    <a href="/admin/resultados" class="btn btn-gamer">Ver Historial</a>
                </div>

            </div>
        </nav>

        <footer>
            <p class="mt-5 cyan-text">Zaloria eSports Tournaments &copy; 2026</p>
        </footer>

    </main>

</body>
</html>
