<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Zaloria eSports - Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #121212; 
            color: #e0e0e0; 
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .logo-principal {
            max-width: 600px;
            filter: drop-shadow(0 0 15px rgba(0, 255, 255, 0.3));
            margin-bottom: 30px;
        }
        .btn-gamer {
            border: 2px solid #00bcd4;
            color: #00bcd4;
            background: transparent;
            font-weight: bold;
            padding: 15px 30px;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-gamer:hover {
            background-color: #00bcd4;
            color: black;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="container text-center">
        <img th:src="@{/images/Zaloria_portada.png}" alt="Zaloria Logo" class="logo-principal img-fluid">
        
        <h2 class="mb-5" style="color: #00bcd4; letter-spacing: 3px;">PANEL DE CONTROL</h2>

        <div class="row justify-content-center gap-3">
            <div class="col-md-4 d-grid">
                <a href="/equipos" class="btn btn-gamer">️ Gestionar Equipos</a>
            </div>
            <div class="col-md-4 d-grid">
                <a href="/jugadores" class="btn btn-gamer"> Gestionar Jugadores</a>
            </div>
            <div class="col-md-4 d-grid">
        <a href="/torneos" class="btn btn-gamer"> Gestionar Torneos</a>
        </div>
        </div>
        
        <p class="mt-5 text-white">Zaloria eSports Tournaments &copy; 2026</p>
    </div>
</body>
</html>
