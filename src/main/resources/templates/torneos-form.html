<!-- FORMULARIO DE CREACIÓN/EDICIÓN DE TORNEOS - Permite crear y configurar torneos eSports -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Zaloria - Configurar Torneo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

    <header>
        <div th:replace="~{layout :: boton-tema(true)}"></div>
    </header>

    <main class="container py-5">

        <section class="row justify-content-center">
            <div class="col-md-8">

                <article class="card card-gamer p-4 shadow-lg">

                    <!-- Título del formulario de configuración -->
                    <h2 class="text-center mb-4" style="color: #00bcd4;">Configurar Torneo</h2>

                    <!-- Formulario para guardar o actualizar datos del torneo -->
                    <form th:action="@{/torneos/guardar}" th:object="${torneo}" method="post">

                        <!-- Campo ID oculto: para edición de torneos existentes -->
                        <input type="hidden" th:field="*{id}">

                        <!-- Fila 1: Nombre del torneo y Estado inicial -->
                        <div class="row mb-3">
                            <!-- Campo: Nombre del torneo -->
                            <div class="col-md-6">
                                <label class="form-label">Nombre del Torneo:</label>
                                <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Zaloria Masters" required>
                            </div>

                            <!-- Campo: Estado inicial del torneo -->
                            <div class="col-md-6">
                                <label class="form-label">Estado Inicial:</label>
                                <select th:field="*{estado}" class="form-select">
                                    <option value="ABIERTO">ABIERTO (Inscripciones)</option>
                                    <option value="EN CURSO">EN CURSO (Jugando)</option>
                                    <option value="FINALIZADO">FINALIZADO</option>
                                </select>
                            </div>
                        </div>

                        <!-- Fila 2: Premio, máximo de equipos y fecha del evento -->
                        <div class="row mb-3">
                            <!-- Campo: Monto del premio en euros -->
                            <div class="col-md-4">
                                <label class="form-label">Premio (€):</label>
                                <input type="number" step="0.01" th:field="*{premio}" class="form-control" placeholder="0.00">
                            </div>

                            <!-- Campo: Número máximo de equipos permitidos -->
                            <div class="col-md-4">
                                <label class="form-label">Máx. Equipos:</label>
                                <input type="number" th:field="*{maxEquipos}" class="form-control">
                            </div>

                            <!-- Campo: Fecha y hora del evento -->
                            <div class="col-md-4">
                                <label class="form-label">Fecha del Evento:</label>
                                <input type="datetime-local" th:field="*{fecha}" class="form-control">
                            </div>
                            <script>
        // Script para bloquear fechas pasadas
        const now = new Date();
        // Formateamos la fecha al formato que entiende el input (YYYY-MM-DDThh:mm)
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
    
    const minDateTime = `${year}-${month}-${day}T${hours}:${minutes}`;
    
    // Aplicamos el mínimo al input
    document.getElementById('fechaTorneo').setAttribute('min', minDateTime);
</script>
                        </div>

                        <!-- Campo: Selección del banner/imagen del torneo -->
                        <div class="mb-3">
                            <label class="form-label text-info">Imagen del Banner:</label>
                            <select th:field="*{bannerUrl}" class="form-select bg-dark text-white border-secondary">
                                <option value="" selected>-- Seleccionar Banner --</option>
                                <option th:each="b : ${listaBanners}" th:value="${b}" th:text="${b}"></option>
                            </select>
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-cyan">PUBLICAR TORNEO</button>
                            <a href="/torneos" class="btn btn-outline-secondary">Cancelar</a>
                        </div>

                    </form>

                </article>

            </div>
        </section>

    </main>

</body>
</html>
