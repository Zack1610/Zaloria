<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Zaloria - Torneos eSports</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div th:replace="~{layout :: boton-tema}"></div>
<div class="container my-5">
    <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-secondary">
        <h1 class="display-6 fw-bold cyan-text"> Torneos Zaloria</h1>
        <div>
            <a href="/admin" class="btn btn-secondary">Volver al Panel</a>
            <a href="/torneos/nuevo" class="btn btn-cyan">+ Crear Nuevo Torneo</a>
        </div>
    </div>

    <div class="table-responsive table-gamer p-3">
        <table class="table table-dark table-hover align-middle mb-0">
            <thead>
                <tr style="border-bottom: 2px solid #00bcd4;">
                    <th>Banner</th>
                    <th>Evento</th>
                    <th>Fecha y Hora</th>
                    <th>Premio</th>
                    <th>Estado</th>
                    <th class="text-center">Equipos</th>
                    <th>Ganador</th>
                    <th class="text-center">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="t : ${listaTorneos}">
                    <td>
                        <img th:src="@{'/images/banners/' + ${t.bannerUrl != null ? t.bannerUrl : 'default_banner.jpg'}}" 
                             alt="Banner" 
                             class="rounded"
                             style="width: 80px; height: 45px; object-fit: cover; border: 1px solid #444;">
                    </td>

                    <td class="fw-bold text-info" th:text="${t.nombre}">Evento</td>
                    <td th:text="${#dates.format(t.fecha, 'dd/MM/yyyy HH:mm')}">Fecha</td>
                    
                    <td th:text="${t.premio} + ' €'">Premio</td>
                    
                    <td>
                        <span class="badge" 
                              th:classappend="${t.estado == 'ABIERTO' ? 'badge-abierto' : (t.estado == 'EN CURSO' ? 'badge-curso' : 'bg-secondary')}"
                              th:text="${t.estado}">Estado</span>
                    </td>
                    
                    <td class="text-center">
                        <a th:href="@{/torneos/ver/{id}(id=${t.id})}" class="badge-link">
                            <span class="badge bg-secondary" 
                                  th:text="${(t.equipos != null ? t.equipos.size() : 0) + ' / ' + t.maxEquipos}">0</span>
                        </a>
                    </td>

                    <td class="text-white">
                        <div th:if="${t.ganador != null}" class="d-flex align-items-center">
                            <img th:src="@{'/images/logos/' + ${t.ganador.logoUrl}}" 
                                 class="rounded-circle me-2" style="width: 25px; height: 25px;">
                            <span th:text="${t.ganador.nombre}"></span>
                        </div>
                        <span th:if="${t.ganador == null}">---</span>
                    </td>
                    
                    <td class="text-center">
                        <div class="d-flex justify-content-center gap-1">
                            <a th:if="${t.estado == 'ABIERTO'}" 
                               th:href="@{/torneos/inscribir/{id}(id=${t.id})}" 
                               class="btn btn-sm btn-outline-info">Inscribir</a>
                            
                            <form th:if="${t.estado == 'ABIERTO'}" th:action="@{/admin/torneos/iniciar}" method="post" style="display:inline;">
                                <input type="hidden" name="id" th:value="${t.id}">
                                <button type="submit" class="btn btn-sm btn-outline-warning">▶ Iniciar</button>
                            </form>

                            <span th:if="${t.estado == 'EN CURSO'}" class="text-info small">Simulación pendiente...</span>

                            <a th:href="@{/torneos/eliminar/{id}(id=${t.id})}" 
                               class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('¿Estás seguro de que quieres eliminar este torneo?')">Eliminar</a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
