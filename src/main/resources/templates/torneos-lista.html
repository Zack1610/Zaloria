<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Zaloria - Torneos eSports</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; padding: 30px; }
        .cyan-text { color: #00bcd4; }
        .table-gamer { background-color: #1e1e1e; border: 1px solid #333; border-radius: 8px; overflow: hidden; }
        .btn-cyan { background-color: #00bcd4; color: black; font-weight: bold; }
        .badge-abierto { background-color: #00bcd4; color: black; }
        .badge-curso { background-color: #ffc107; color: black; }
        .badge-link { text-decoration: none; transition: 0.2s; }
        .badge-link:hover .badge { background-color: #00bcd4 !important; color: black !important; }
    </style>
</head>
<body>
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-secondary">
        <h1 class="display-6 fw-bold cyan-text"> Torneos Zaloria</h1>
        <div>
            <a href="/" class="btn btn-outline-secondary me-2"> Inicio</a>
            <a href="/torneos/nuevo" class="btn btn-cyan">+ Crear Nuevo Torneo</a>
        </div>
    </div>

    <div class="table-responsive table-gamer p-3">
        <table class="table table-dark table-hover align-middle mb-0">
            <thead>
                <tr style="border-bottom: 2px solid #00bcd4;">
                    <th>Evento</th>
                    <th>Fecha y Hora</th>
                    <th>Premio</th>
                    <th>Máx. Equipos</th>
                    <th>Estado</th>
                    <th class="text-center">Participantes</th>
                    <th class="text-center">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="t : ${listaTorneos}">
                    <td class="fw-bold text-info" th:text="${t.nombre}">Evento</td>
                    <td th:text="${#dates.format(t.fecha, 'dd/MM/yyyy HH:mm')}">Fecha</td>
                    <td class="text-warning fw-bold" th:text="${t.premio + ' €'}">Premio</td>
                    <td th:text="${t.maxEquipos}">Máx</td>
                    <td>
                        <span class="badge" 
                              th:classappend="${t.estado == 'ABIERTO' ? 'badge-abierto' : 'badge-curso'}"
                              th:text="${t.estado}">Estado</span>
                    </td>
                    
                    <td class="text-center">
                        <a th:href="@{/torneos/ver/{id}(id=${t.id})}" class="badge-link" title="Ver participantes">
                            <span class="badge bg-secondary" 
                                  th:text="${t.equipos != null ? t.equipos.size() : 0}">0</span>
                        </a>
                    </td>
                    
                    <td class="text-center">
                        <a th:href="@{/torneos/inscribir/{id}(id=${t.id})}" class="btn btn-sm btn-outline-info">
                              Inscribir Equipo
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
