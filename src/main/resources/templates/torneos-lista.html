<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Zaloria - Torneos eSports</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div th:replace="~{layout :: boton-tema}"></div>
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-secondary">
        <h1 class="display-6 fw-bold cyan-text"> Torneos Zaloria</h1>
        <div>
            <a href="/admin" class="btn btn-secondary">Volver al Panel</a>
            <a href="/torneos/nuevo" class="btn btn-cyan">+ Crear Nuevo Torneo</a>
        </div>
    </div>

    <div class="table-responsive table-gamer p-3">
        <table class="table table-dark table-hover align-middle mb-0">
            <thead>
                <tr style="border-bottom: 2px solid #00bcd4;">
                    <th>Evento</th>
                    <th>Fecha y Hora</th>
                    <th>Premio</th>
                    <th>Máx. Equipos</th>
                    <th>Estado</th>
                    <th class="text-center">Participantes</th>
                    <th>Ganador</th>
                    <th class="text-center">Acciones</th>
                </tr>
            </thead>
            <tbody>
    <tr th:each="t : ${listaTorneos}">
        <td class="fw-bold text-info" th:text="${t.nombre}">Evento</td>
        <td th:text="${#dates.format(t.fecha, 'dd/MM/yyyy HH:mm')}">Fecha</td>
        <td class="text-warning fw-bold" th:text="${t.premio + ' €'}">Premio</td>
        <td th:text="${t.maxEquipos}">Máx</td>
        <td>
            <span class="badge" 
                  th:classappend="${t.estado == 'ABIERTO' ? 'badge-abierto' : 'badge-curso'}"
                  th:text="${t.estado}">Estado</span>
        </td>
        
        <td class="text-center">
            <a th:href="@{/torneos/ver/{id}(id=${t.id})}" class="badge-link">
                <span class="badge bg-secondary" 
                      th:text="${t.equipos != null ? t.equipos.size() : 0}">0</span>
            </a>
        </td>

        <td class="text-white">
            <span th:text="${t.ganador != null ? '🏆 ' + t.ganador.nombre : '---'}"></span>
        </td>
        
        <td class="text-center">
    <a th:if="${t.ganador == null}" 
       th:href="@{/torneos/inscribir/{id}(id=${t.id})}" 
       class="btn btn-sm btn-outline-info">
        Inscribir
    </a>
    
    <a th:if="${t.ganador == null}" 
       th:href="@{/torneos/finalizar/{id}(id=${t.id})}" 
       class="btn btn-sm btn-outline-warning ms-2">
       🏆 Finalizar
    </a>
            <a th:href="@{/torneos/eliminar/{id}(id=${t.id})}" 
   class="btn btn-sm btn-outline-danger ms-1"
   onclick="return confirm('¿Estás seguro de que quieres eliminar este torneo?')">
   ️ Eliminar
</a>
</td>
    </tr>
</tbody>
        </table>
    </div>
</div>
</body>
</html>
