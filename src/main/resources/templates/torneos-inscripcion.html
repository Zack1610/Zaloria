<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Zaloria - Inscribir Equipo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; padding-top: 50px; }
        .card-gamer { background-color: #1e1e1e; border: 1px solid #00bcd4; }
        .btn-cyan { background-color: #00bcd4; color: black; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card card-gamer p-4 text-center">
                <h3 class="mb-4">Inscribir en: <span class="text-info" th:text="${torneo.nombre}"></span></h3>
                
                <form th:action="@{/torneos/inscribir/guardar}" method="post">
                    <input type="hidden" name="torneoId" th:value="${torneo.id}">
                    
                    <div class="mb-4 text-start">
                        <label class="form-label text-info">Selecciona el Equipo:</label>
                        <select name="equipoId" class="form-select bg-dark text-white" required>
                            <option value="">-- Elegir Equipo --</option>
                            <option th:each="e : ${listaEquipos}" th:value="${e.id}" th:text="${e.nombre}"></option>
                        </select>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-cyan">CONFIRMAR INSCRIPCIÓN</button>
                        <a href="/torneos" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
