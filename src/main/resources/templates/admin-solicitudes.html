<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Zaloria - Gestión de Gremio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="bg-dark text-white">
    <div th:replace="~{layout :: boton-tema}"></div>
    <div class="container my-5">
        <div class="card card-gamer p-4 shadow-lg border-info">
            <h2 class="cyan-text mb-4"> Solicitudes de Ingreso al Gremio</h2>
            
            <div class="table-responsive">
                <table class="table table-dark table-hover align-middle">
                    <thead>
                        <tr class="text-info">
                            <th>Nickname</th>
                            <th>Email</th>
                            <th>Fecha</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="s : ${solicitudes}">
                            <td class="fw-bold" th:text="${s.nickname}"></td>
                            
                            <td th:text="${s.email}"></td>
                            
                            <td th:text="${#temporals.format(s.fechaCreacion, 'dd/MM/yyyy HH:mm')}"></td>
                            
                           <td class="d-flex gap-2">
    <form th:action="@{/admin/solicitudes/actualizar}" method="post">
        <input type="hidden" name="id" th:value="${s.id}">
        <input type="hidden" name="estado" value="ACEPTADA">
        <button type="submit" class="btn btn-success btn-sm" th:if="${s.estado == 'PENDIENTE'}"> Aceptar</button>
    </form>

    <form th:action="@{/admin/solicitudes/actualizar}" method="post">
        <input type="hidden" name="id" th:value="${s.id}">
        <input type="hidden" name="estado" value="RECHAZADA">
        <button type="submit" class="btn btn-danger btn-sm" th:if="${s.estado == 'PENDIENTE'}"> Rechazar</button>
    </form>

                <button class="btn cyan-text btn-sm" 
                        th:title="${s.motivo}"
                        onclick="alert('Motivo: ' + this.getAttribute('title'))"> Ver</button>
                                        </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="mt-4 border-top border-secondary pt-3">
                <a href="/admin" class="btn btn-gamer btn-sm">Volver al Panel Principal</a>
            </div>
        </div>
    </div>
</body>
</html>
