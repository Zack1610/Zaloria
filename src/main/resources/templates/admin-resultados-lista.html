<!-- PÁGINA DE HISTORIAL DE RESULTADOS - Muestra todos los torneos finalizados con resultados -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Zaloria - Historial de Resultados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body class="bg-dark text-white">

    <header>
        <div th:replace="~{layout :: boton-tema(true)}"></div>
    </header>

    <main class="container my-5">

        <!-- Tarjeta principal del historial -->
        <section class="card card-gamer p-4 border-info bg-dark">

            <!-- Título con icono de trofeo -->
            <h2 class="cyan-text mb-4">🏆 Historial de Torneos Finalizados</h2>

            <div class="table-responsive">
                <table class="table table-dark table-hover">
                    <thead>
                        <tr class="text-info">
                            <th>Torneo</th>
                            <th>Ganador</th>
                            <th>MVP</th>
                            <th>Puntuación</th>
                            <th>Eliminaciones</th>
                        </tr>
                    </thead>

                    <tbody>
                        <!-- Itera sobre cada resultado registrado -->
                        <tr th:each="r : ${listaResultados}">
                            <!-- Nombre del torneo -->
                            <td th:text="${r.torneo.nombre}"></td>
                            <!-- Equipo ganador -->
                            <td class="fw-bold text-success" th:text="${r.equipoGanador.nombre}"></td>
                            <!-- Jugador MVP (Most Valuable Player) del torneo -->
                            <td th:text="${r.mvp.nickname}"></td>
                            <!-- Puntuación total del equipo ganador -->
                            <td th:text="${r.puntuacion}"></td>
                            <!-- Total de eliminaciones conseguidas en el torneo -->
                            <td th:text="${r.eliminaciones}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <footer class="mt-3">
                <a href="/admin" class="btn cyan-text">Volver al Panel</a>
            </footer>

        </section>

    </main>

</body>
</html>
