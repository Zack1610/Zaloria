<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Zaloria - Historial de Resultados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="bg-dark text-white">
    <div th:replace="~{layout :: boton-tema}"></div>
    <div class="container my-5">
        <div class="card card-gamer p-4 border-info bg-dark">
            <h2 class="cyan-text mb-4">🏆 Historial de Torneos Finalizados</h2>
            <div class="table-responsive">
                <table class="table table-dark table-hover">
                    <thead>
                        <tr class="text-info">
                            <th>Torneo</th>
                            <th>Ganador</th>
                            <th>MVP</th>
                            <th>Puntuación</th>
                            <th>Eliminaciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="r : ${listaResultados}">
                            <td th:text="${r.torneo.nombre}"></td>
                            <td class="fw-bold text-success" th:text="${r.equipoGanador.nombre}"></td>
                            <td th:text="${r.mvp.nickname}"></td>
                            <td th:text="${r.puntuacion}"></td>
                            <td th:text="${r.eliminaciones}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <a href="/admin" class="btn cyan-text mt-3">Volver al Panel</a>
        </div>
    </div>
</body>
</html>
