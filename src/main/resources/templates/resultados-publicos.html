<!-- PÁGINA PÚBLICA: HALL OF FAME - Muestra ranking de campeones y MVPs de Zaloria -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Zaloria - Hall of Fame</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>
    <header>
        <div th:replace="~{layout :: boton-tema(mostrarSalir=false)}"></div>
    </header>

    <main class="container my-5">

        <!-- TÍTULO PRINCIPAL: Hall of Fame con ranking de campeones -->
        <section class="text-center mb-5">
            <h1 class="display-4 fw-bold cyan-text">🏆 HALL OF FAME</h1>
            <p class="text-info">Historial de Campeones y MVP de Zaloria eSports</p>
            <hr class="border-info opacity-50">
        </section>

        <!-- SECCIÓN: TOP 3 EQUIPOS CON MÁS VICTORIAS -->
        <section class="row mb-5 justify-content-center">
            <header class="col-12 text-center mb-4">
                <h2 class="text-warning h3">👑 TOP TEAMS 👑</h2>
            </header>

            <!-- Tarjeta de equipo: muestra top 3 (oro, plata, bronce) -->
            <article class="col-md-3 text-center"
                     th:each="rank, iter : ${ranking}"
                     th:if="${iter.index < 3}">
                <div class="card bg-black border-info p-3 mb-3 shadow">
                    <!-- Emoji de medalla según posición: 1º oro, 2º plata, 3º bronce -->
                    <h1 class="display-6"
                        th:text="${iter.index == 0 ? '🥇' : (iter.index == 1 ? '🥈' : '🥉')}"></h1>

                    <img th:src="@{'/images/logos/' + ${rank.logoUrl}}"
                         class="rounded-circle mx-auto mb-2"
                         style="width: 60px; height: 60px; border: 2px solid #00bcd4;">

                    <h5 class="cyan-text fw-bold" th:text="${rank.nombreEquipo}">Equipo</h5>
                    <span class="badge bg-warning text-dark"
                          th:text="${rank.victorias} + ' COPAS'">0</span>
                </div>
            </article>
        </section>

        <!-- TOP KILLERS -->
        <section class="row mb-5 justify-content-center">
            <header class="col-12 text-center mb-4">
                <h2 class="text-danger h3">💀 TOP KILLERS (MVPs) 💀</h2>
                <p class="text-danger small">Suma total de eliminaciones conseguidas como MVP</p>
            </header>

            <article class="col-md-3 text-center"
                     th:each="m, iter : ${rankingMvp}"
                     th:if="${iter.index < 3}">
                <div class="card bg-black border-danger p-3 mb-3 shadow-lg">
                    <div class="position-absolute top-0 start-50 translate-middle">
                        <span class="badge rounded-pill bg-danger"
                              th:text="'#' + (${iter.index + 1})">#1</span>
                    </div>

                    <img th:src="@{'/images/skins/' + ${m.skinUrl}}"
                         class="mx-auto mb-2 rounded border border-secondary"
                         style="width: 80px; height: 80px; object-fit: cover;">

                    <h5 class="text-white fw-bold mb-0" th:text="${m.nickname}">Nickname</h5>

                    <div class="mt-2">
                        <span class="text-danger fw-bold"
                              style="font-size: 1.2rem;"
                              th:text="${m.totalKills}">0</span>
                        <small class="text-warning d-block" style="font-size: 0.7rem;">KILLS ACUMULADAS</small>
                    </div>
                </div>
            </article>
        </section>

        <hr class="border-secondary mb-5">

        <!-- LISTA DE RESULTADOS -->
        <section class="row g-4">
            <article class="col-md-6 col-lg-4" th:each="r : ${listaResultados}">
                <div class="card bg-dark border-info h-100 shadow-lg">

                    <img th:src="@{'/images/banners/' + ${r.torneo.bannerUrl}}"
                         class="card-img-top"
                         alt="Banner"
                         style="height: 180px; object-fit: cover;">

                    <div class="card-body">
                        <h5 class="card-title cyan-text fw-bold"
                            th:text="${r.torneo.nombre}">Nombre Torneo</h5>

                        <div class="mt-3 p-3 bg-black rounded border border-secondary shadow-sm">

                            <div class="d-flex justify-content-between mb-1 small">
                                <span class="text-white-50">Campeón:</span>
                                <span class="text-success fw-bold"
                                      th:text="${r.equipoGanador.nombre}">-</span>
                            </div>

                            <div class="d-flex justify-content-between mb-1 small">
                                <span class="text-white-50">MVP:</span>
                                <span class="text-warning"
                                      th:text="${r.mvp.nickname}">-</span>
                            </div>

                            <hr class="border-secondary my-2">

                            <div class="d-flex justify-content-between mb-1 small">
                                <span class="text-white-50">Eliminaciones:</span>
                                <span class="text-info"
                                      th:text="${r.eliminaciones}">0</span>
                            </div>

                            <div class="d-flex justify-content-between mb-1 small">
                                <span class="text-white-50">Puntos Posición:</span>
                                <span class="text-info"
                                      th:text="${r.puntosPosicion}">0</span>
                            </div>

                            <div class="d-flex justify-content-between fw-bold border-top border-secondary pt-2 mt-2">
                                <span class="text-white-50">PUNTUACIÓN:</span>
                                <span class="text-warning"
                                      th:text="${r.puntosTotales} + ' PTS'">0</span>
                            </div>

                        </div>
                    </div>
                </div>
            </article>
        </section>

        <footer class="text-center mt-5">
            <a href="/" class="btn btn-outline-info">Volver al Inicio</a>
        </footer>

    </main>
</body>
</html>
