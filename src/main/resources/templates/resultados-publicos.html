<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Zaloria - Hall of Fame</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div th:replace="~{layout :: boton-tema}"></div>
    <div class="container my-5">
        <div class="text-center mb-5">
            <h1 class="display-4 fw-bold cyan-text">🏆 HALL OF FAME</h1>
            <p class="text-info">Historial de Campeones y MVP de Zaloria eSports</p>
            <hr class="border-info opacity-50">
        </div>
<div class="row mb-5 justify-content-center">
    <div class="col-12 text-center mb-4">
        <h2 class="text-warning h3">👑 TOP TEAMS 👑</h2>
    </div>
    
    <div class="col-md-3 text-center" th:each="rank, iter : ${ranking}" th:if="${iter.index < 3}">
        <div class="card bg-black border-info p-3 mb-3 shadow">
            <h1 class="display-6" th:text="${iter.index == 0 ? '🥇' : (iter.index == 1 ? '🥈' : '🥉')}"></h1>
            <img th:src="@{'/images/logos/' + ${rank.logoUrl}}" class="rounded-circle mx-auto mb-2" style="width: 60px; height: 60px; border: 2px solid #00bcd4;">
            <h5 class="cyan-text fw-bold" th:text="${rank.nombreEquipo}">Equipo</h5>
            <span class="badge bg-warning text-dark" th:text="${rank.victorias} + ' COPAS'">0</span>
        </div>
    </div>
</div>
<hr class="border-secondary mb-5">
        <div class="row g-4">
            <div class="col-md-6 col-lg-4" th:each="r : ${listaResultados}">
                <div class="card bg-dark border-info h-100 shadow-lg">
                    <img th:src="@{'/images/banners/' + ${r.torneo.bannerUrl}}" class="card-img-top" alt="Banner" style="height: 180px; object-fit: cover;">
                    
                    <div class="card-body">
    <h5 class="card-title cyan-text fw-bold" th:text="${r.torneo.nombre}">Nombre Torneo</h5>
    
    <div class="mt-3 p-3 bg-black rounded border border-secondary shadow-sm">
        <div class="d-flex justify-content-between mb-1 small">
            <span class="text-white-50">Campeón:</span>
            <span class="text-success fw-bold" th:text="${r.equipoGanador.nombre}">-</span>
        </div>
        <div class="d-flex justify-content-between mb-1 small">
            <span class="text-white-50">MVP:</span>
            <span class="text-warning" th:text="${r.mvp.nickname}">-</span>
        </div>
        <hr class="border-secondary my-2">
        
        <div class="d-flex justify-content-between mb-1 small">
            <span class="text-white-50">Eliminaciones:</span>
            <span class="text-info" th:text="${r.eliminaciones}">0</span>
        </div>
        <div class="d-flex justify-content-between mb-1 small">
            <span class="text-white-50">Puntos Posición:</span>
            <span class="text-info" th:text="${r.puntosPosicion}">0</span>
        </div>
        <div class="d-flex justify-content-between fw-bold border-top border-secondary pt-2 mt-2">
            <span class="text-white-50">PUNTUACIÓN:</span>
            <span class="text-warning" th:text="${r.puntosTotales} + ' PTS'">0</span>
        </div>
    </div>
</div>
                </div>
            </div>
        </div>

        <div class="text-center mt-5">
            <a href="/" class="btn btn-outline-info">Volver al Inicio</a>
        </div>
    </div>
</body>
</html>
