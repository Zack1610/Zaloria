<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Zaloria - Nuevo Equipo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div th:replace="~{layout :: boton-tema}"></div>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card card-gamer p-4 shadow-lg">
                <h2 class="text-center mb-4" style="color: #00bcd4;">️ Crear Equipo</h2>
                
                <form th:action="@{/equipos/guardar}" th:object="${equipo}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="mb-3">
                        <label class="form-label">Nombre del Clan/Equipo:</label>
                        <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Zaloria Dragons" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Capitán:</label>
                        <input type="text" th:field="*{capitan}" class="form-control" placeholder="Nombre del capitán">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Entrenador:</label>
                        <input type="text" th:field="*{entrenador}" class="form-control" placeholder="Nombre del coach">
                    </div>

                        <div class="mb-3">
                <label class="form-label">Selecciona el Logo:</label>
                <select th:field="*{logoUrl}" class="form-select bg-dark text-white border-secondary">
                <option value="" selected>-- Seleccionar Logo --</option>
                <option th:each="logo : ${listaLogos}" th:value="${logo}" th:text="${logo}"></option>
                </select>
                        </div>
                        <div class="mb-3">
            <label class="form-label text-info">Manager del Equipo:</label>
            <input type="text" th:field="*{managers}" class="form-control bg-dark text-white border-info" placeholder="Nombre del Manager">
            </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-cyan">FUNDAR EQUIPO</button>
                        <a href="/equipos" class="btn btn-outline-secondary">Volver</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
