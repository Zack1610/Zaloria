<!-- FORMULARIO DE CREACIÓN/EDICIÓN DE EQUIPOS - Permite crear un nuevo equipo o editar uno existente -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Zaloria - Nuevo Equipo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

    <header>
        <div th:replace="~{layout :: boton-tema(true)}"></div>
    </header>

    <main class="container py-5">

        <section class="row justify-content-center">
            <div class="col-md-7">

                <article class="card card-gamer p-4 shadow-lg">

                    <!-- Título del formulario -->
                    <h2 class="text-center mb-4" style="color: #00bcd4;">️Crear Equipo</h2>

                    <!-- Formulario para guardar o actualizar datos del equipo -->
                    <form th:action="@{/equipos/guardar}" th:object="${equipo}" method="post">

                        <!-- Campo ID oculto: se usa para edición de equipos existentes -->
                        <input type="hidden" th:field="*{id}">

                        <!-- Campo: Nombre del Equipo -->
                        <div class="mb-3">
                            <label class="form-label">Nombre del Clan/Equipo:</label>
                            <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Zaloria Dragons" required>
                        </div>

                        <!-- Campo: Capitán del Equipo -->
                        <div class="mb-3">
                            <label class="form-label">Capitán:</label>
                            <input type="text" th:field="*{capitan}" class="form-control" placeholder="Nombre del capitán">
                        </div>

                        <!-- Campo: Entrenador/Coach del Equipo -->
                        <div class="mb-3">
                            <label class="form-label">Entrenador:</label>
                            <input type="text" th:field="*{entrenador}" class="form-control" placeholder="Nombre del coach">
                        </div>

                        <!-- Campo: Selección del logo del equipo -->
                        <div class="mb-3">
                            <label class="form-label">Selecciona el Logo:</label>
                            <select th:field="*{logoUrl}" class="form-select bg-dark text-white border-secondary">
                                <option value="" selected>-- Seleccionar Logo --</option>
                                <option th:each="logo : ${listaLogos}" th:value="${logo}" th:text="${logo}"></option>
                            </select>
                        </div>

                        <!-- Campo: Manager del Equipo -->
                        <div class="mb-3">
                            <label class="form-label text-info">Manager del Equipo:</label>
                            <input type="text" th:field="*{managers}" class="form-control bg-dark text-white border-info" placeholder="Nombre del Manager">
                        </div>

                        <!-- Campo: Número máximo de jugadores permitidos -->
                        <div class="mb-3">
                            <label class="form-label">Máximo de Jugadores:</label>
                            <input type="number" th:field="*{maxJugadores}" class="form-control bg-dark text-white border-secondary" min="1" max="20" required>
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-cyan">FUNDAR EQUIPO</button>
                            <a href="/equipos" class="btn btn-outline-secondary">Volver</a>
                        </div>

                    </form>

                </article>

            </div>
        </section>

    </main>

</body>
</html>
