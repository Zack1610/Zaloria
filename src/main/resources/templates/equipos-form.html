<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Zaloria - Nuevo Equipo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
   <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div th:replace="~{layout :: boton-tema}"></div>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card card-gamer p-4">
                <h2 class="text-center mb-4" style="color: #00bcd4;">️ Crear Equipo</h2>
                <form th:action="@{/equipos/guardar}" th:object="${equipo}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Nombre del Clan/Equipo:</label>
                        <input type="text" th:field="*{nombre}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Capitán:</label>
                        <input type="text" th:field="*{capitan}" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Entrenadores:</label>
                        <input type="text" th:field="*{entrenadores}" class="form-control">
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-cyan">FUNDAR EQUIPO</button>
                        <a href="/equipos" class="btn btn-outline-secondary">Volver</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
