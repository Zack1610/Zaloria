<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Zaloria - Panel de Jugadores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 2. Un poco de CSS personalizado para el toque gamer */
        body {
            background-color: #121212; /* Fondo casi negro */
            color: #e0e0e0; /* Texto gris muy claro */
            padding-top: 20px;
        }
        .table-gamer {
            background-color: #1e1e1e; /* Fondo de tabla gris oscuro */
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,255,255,0.1); /* Brillo cian muy sutil */
        }
        .table-gamer thead {
            background-color: #00bcd4; /* Cian para las cabeceras */
            color: #000;
        }
        .table-gamer tbody tr:hover {
            background-color: #2a2a2a; /* Efecto hover al pasar el ratón */
        }
        .btn-cyan {
            background-color: #00bcd4;
            color: black;
            font-weight: bold;
        }
        .btn-cyan:hover {
            background-color: #0097a7;
            color: white;
        }
        .cyan-text {
            color: #00bcd4;
        }
        label { 
            color: #00bcd4 !important; 
            margin-bottom: 5px;
            display: block;
        }
        
        .form-control, .form-select {
            color: white !important;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom border-secondary">
        <h1 class="display-5 fw-bold cyan-text">Panel de Jugadores</h1>
        <div>
            <a href="/" class="btn btn-outline-info me-2"> Inicio</a>
            <a href="/equipos" class="btn btn-outline-secondary me-2">Ver Equipos</a>
            <a href="/jugadores/nuevo" class="btn btn-cyan">+ Fichar Jugador</a>
        </div>
    </div>

    <div class="table-responsive table-gamer p-3">
        <table class="table table-dark table-striped table-hover align-middle mb-0">
            <thead>
                <tr>
                    <th scope="col" class="ps-3">Nickname</th>
                    <th scope="col">Email de Contacto</th>
                    <th scope="col">Equipo Actual</th>
                    <th scope="col" class="text-center">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="j : ${listaJugadores}">
                    <td class="fw-bold ps-3 text-info" th:text="${j.nickname}">Nickname</td>
                    <td th:text="${j.email}">Email</td>
                    <td>
                        <span class="badge bg-secondary text-wrap" 
                              th:text="${j.equipo != null ? j.equipo.nombre : 'Sin equipo'}">
                            Equipo
                        </span>
                    </td>
                    <td class="text-center">
                        <a th:href="@{/jugadores/editar/{id}(id=${j.id})}" 
                           class="btn btn-sm btn-outline-light me-1">️ Editar</a>
                        
                        <a th:href="@{/jugadores/borrar/{id}(id=${j.id})}" 
                           class="btn btn-sm btn-outline-danger" 
                           onclick="return confirm('¿Estás seguro de que quieres eliminar a este jugador?')">
                            Echar
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <div class="mt-4 text-center text-white">
        <small>Zaloria eSports Management System &copy; 2026</small>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
