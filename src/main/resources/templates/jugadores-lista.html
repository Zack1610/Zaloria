<!-- PÁGINA DE LISTA DE JUGADORES - Muestra todos los jugadores registrados en el sistema -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaloria - Panel de Jugadores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

    <header>
        <div th:replace="~{layout :: boton-tema(true)}"></div>
    </header>

    <main class="container my-5">

        <!-- Encabezado con título y navegación -->
        <section class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom border-secondary">
            <h1 class="display-5 fw-bold cyan-text">Panel de Jugadores</h1>

            <!-- Botones de navegación: volver al panel, ver equipos o fichar nuevo jugador -->
            <nav>
                <a href="/admin" class="btn btn-secondary">Volver al Panel</a>
                <a href="/equipos" class="btn btn-outline-secondary me-2">Ver Equipos</a>
                <a href="/jugadores/nuevo" class="btn btn-cyan">+ Fichar Jugador</a>
            </nav>
        </section>

        <section class="table-responsive table-gamer p-3">
            <div class="table-responsive"></div>
            <table class="table table-dark table-striped table-hover align-middle mb-0">
                <thead>
                    <tr>
                        <th scope="col" class="ps-3">Skin</th>
                        <th scope="col">Nickname</th>
                        <th scope="col">Email de Contacto</th>
                        <th scope="col">Equipo Actual</th>
                        <th scope="col" class="text-center">Acciones</th>
                    </tr>
                </thead>

                <tbody>
                    <!-- Itera sobre cada jugador en la lista -->
                    <tr th:each="j : ${listaJugadores}">
                        <!-- Skin/Avatar del jugador -->
                        <td class="ps-3">
                            <img th:src="@{'/images/skins/' + ${j.skinUrl != null ? j.skinUrl : 'default_skin.jpg'}}"
                                 alt="Skin"
                                 class="rounded border border-secondary"
                                 style="width: 50px; height: 50px; object-fit: cover; background-color: #2a2a2a;">
                        </td>

                        <!-- Nickname del jugador (nombre de usuario en juego) -->
                        <td class="fw-bold text-info" th:text="${j.nickname}">Nickname</td>
                        <!-- Email de contacto del jugador -->
                        <td th:text="${j.email}">Email</td>

                        <!-- Equipo al que pertenece el jugador -->
                        <td>
                            <span class="badge bg-secondary text-wrap"
                                  th:text="${j.equipo != null ? j.equipo.nombre : 'Sin equipo'}">
                                Equipo
                            </span>
                        </td>

                        <!-- Botones de acciones: Editar y Eliminar -->
                        <td class="text-center">
                            <a th:href="@{/jugadores/editar/{id}(id=${j.id})}"
                               class="btn btn-sm btn-outline-light me-1">Editar</a>

                            <!-- Botón para echar (eliminar) al jugador con confirmación -->
                            <a th:href="@{/jugadores/borrar/{id}(id=${j.id})}"
                               class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('¿Estás seguro de que quieres eliminar a este jugador?')">
                                Echar
                            </a>
                        </td>
                    </tr>
                </tbody>

            </table>
        </section>

        <footer class="mt-4 text-center cyan-text">
            <small>Zaloria eSports Management System &copy; 2026</small>
        </footer>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
