<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Zaloria - Panel de Jugadores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div th:replace="~{layout :: boton-tema}"></div>

    <div class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom border-secondary">
            <h1 class="display-5 fw-bold cyan-text">Panel de Jugadores</h1>
            <div>
                <a href="/admin" class="btn btn-secondary">Volver al Panel</a>
                <a href="/equipos" class="btn btn-outline-secondary me-2">Ver Equipos</a>
                <a href="/jugadores/nuevo" class="btn btn-cyan">+ Fichar Jugador</a>
            </div>
        </div>

        <div class="table-responsive table-gamer p-3">
            <table class="table table-dark table-striped table-hover align-middle mb-0">
                <thead>
                    <tr>
                        <th scope="col" class="ps-3">Skin</th> 
                        <th scope="col">Nickname</th>
                        <th scope="col">Email de Contacto</th>
                        <th scope="col">Equipo Actual</th>
                        <th scope="col" class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="j : ${listaJugadores}">
                        <td class="ps-3">
                            <img th:src="@{'/images/skins/' + ${j.skinUrl != null ? j.skinUrl : 'default_skin.jpg'}}" 
                                 alt="Skin" 
                                 class="rounded border border-secondary"
                                 style="width: 50px; height: 50px; object-fit: cover; background-color: #2a2a2a;">
                        </td>
                        
                        <td class="fw-bold text-info" th:text="${j.nickname}">Nickname</td>
                        <td th:text="${j.email}">Email</td>
                        <td>
                            <span class="badge bg-secondary text-wrap" 
                                  th:text="${j.equipo != null ? j.equipo.nombre : 'Sin equipo'}">
                                Equipo
                            </span>
                        </td>
                        <td class="text-center">
                            <a th:href="@{/jugadores/editar/{id}(id=${j.id})}" 
                               class="btn btn-sm btn-outline-light me-1">Editar</a>
                            
                            <a th:href="@{/jugadores/borrar/{id}(id=${j.id})}" 
                               class="btn btn-sm btn-outline-danger" 
                               onclick="return confirm('¿Estás seguro de que quieres eliminar a este jugador?')">
                                Echar
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-4 text-center cyan-text">
            <small>Zaloria eSports Management System &copy; 2026</small>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
