<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Zaloria - Simulador de Torneos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="bg-dark text-white">
    <div th:replace="~{layout :: boton-tema}"></div>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card card-gamer p-5 shadow-lg border-info">
                    <h2 class="cyan-text mb-4 text-center"> Centro de Simulación de Resultados</h2>
                    <p class="text-white-50 text-center mb-5">
                        Selecciona un torneo activo para generar las estadísticas finales de forma aleatoria.
                    </p>
                    <div th:if="${error}" class="alert alert-danger bg-dark text-danger border-danger mb-4 shadow-sm">
                <strong th:text="${error}"></strong>
                            </div>

                    <form th:action="@{/admin/resultados/simular}" method="post">
                        <div class="mb-4">
                            <label class="form-label text-info fw-bold">🏆 Torneo Disponible:</label>
                            <select name="torneoId" class="form-select bg-dark text-white border-info" required>
    <option value="">-- Elige un Torneo para finalizar --</option>
    <option th:each="t : ${torneos}" 
            th:if="${t.estado == 'EN CURSO'}"
            th:value="${t.id}" 
            th:text="${t.nombre + ' (' + t.equipos.size() + ' equipos)'}">
                    </option>
                                </select>
                        </div>

                        <div class="alert alert-info bg-transparent border-info text-cyan small mb-4">
                            <strong>Nota:</strong> Al simular, el sistema elegirá un Equipo Ganador, un MVP y generará la puntuación automáticamente. El estado del torneo cambiará a <em>FINALIZADO</em>.
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-gamer btn-lg py-3 fw-bold">
                                INICIAR SIMULACIÓN 
                            </button>
                            <a href="/admin" class="btn btn-outline-secondary mt-3">Volver al Panel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
