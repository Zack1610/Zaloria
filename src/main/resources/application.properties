# 1. Conexi\u00f3n a la base de datos (Zaloria)
spring.datasource.url=jdbc:mysql://localhost:3306/zaloria
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Configuraci\u00f3n de Hibernate (Para que Java entienda tus tablas)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 3. Puerto del servidor (por defecto es 8080)
server.port=8080